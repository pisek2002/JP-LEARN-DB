<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>สมัครสมาชิก - JP-LEARN</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; font-family: 'Sarabun', sans-serif; }
        .register-card { background: white; border-radius: 20px; padding: 40px; width: 100%; max-width: 450px; box-shadow: 0 15px 35px rgba(0,0,0,0.2); }
        .btn-register { background: #764ba2; color: white; border-radius: 30px; padding: 12px; border: none; width: 100%; font-weight: 600; margin-top: 20px; }
        .form-control { border-radius: 10px; padding: 12px; }
    </style>
</head>
<body>

    <div class="register-card text-center">
        <h2 class="fw-bold mb-4">สมัครสมาชิก 🇯🇵</h2>
        <form id="registerForm">
            <div class="mb-3 text-start">
                <label class="form-label fw-bold">ชื่อ-นามสกุล</label>
                <input type="text" id="fullName" class="form-control" placeholder="ชื่อของคุณ" required>
            </div>
            <div class="mb-3 text-start">
                <label class="form-label fw-bold">อีเมล</label>
                <input type="email" id="email" class="form-control" placeholder="name@example.com" required>
            </div>
            <div class="mb-4 text-start">
                <label class="form-label fw-bold">รหัสผ่าน</label>
                <input type="password" id="password" class="form-control" placeholder="อย่างน้อย 6 ตัวอักษร" required minlength="6">
            </div>
            <button type="submit" class="btn-register">สร้างบัญชีสมาชิก</button>
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script>
        // ประกาศแค่รอบเดียวจบ
        const SUPABASE_URL = 'https://dxgcmffmhnkpxnxzhfwt.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_Ay5R-kORfMcSKwP3J4UnSg_xN2y8Qmz';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const fullName = document.getElementById('fullName').value;

            try {
                // 1. สมัครสมาชิก
                const { data, error } = await supabaseClient.auth.signUp({ email, password });
                if (error) throw error;

                if (data.user) {
                    // 2. บันทึกเข้าตาราง profiles (ใช้ชื่อคอลัมน์ full_name ตามรูปตารางล่าสุดของคุณ)
                    const { error: pError } = await supabaseClient
                        .from('profiles')
                        .insert([{ id: data.user.id, full_name: fullName, status: 'pending' }]);
                    
                    if (pError) throw pError;

                    alert("สมัครสมาชิกสำเร็จ!");
                    window.location.href = "login.html";
                }
            } catch (err) {
                alert("เกิดข้อผิดพลาด: " + err.message);
            }
        });
    </script>
</body>
</html>
